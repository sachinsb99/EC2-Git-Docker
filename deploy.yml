name: Deploy Website to EC2

# Trigger: runs on every push to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest         # GitHub's free Linux runner

    steps:

      # Step 1: Checkout your code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: SSH into EC2 and deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Go to project folder
            cd my-website

            # Pull latest code from GitHub
            git pull origin main

            # Stop and remove old container
            docker stop website-container || true
            docker rm website-container || true

            # Remove old image
            docker rmi my-website || true

            # Build new Docker image
            docker build -t my-website .

            # Run new container
            docker run -d -p 80:80 --name website-container my-website

            echo "✅ Deployment successful!"
